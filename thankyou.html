<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You – QuickPOS</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f8f9ff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
        }

        .card {
            background: #fff;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
            padding: 60px 48px;
            text-align: center;
            max-width: 480px;
            width: 100%;
        }

        .icon {
            width: 72px;
            height: 72px;
            background: #4f46e5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 28px;
        }

        .icon svg {
            width: 36px;
            height: 36px;
            fill: none;
            stroke: #fff;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        h1 {
            font-size: 2rem;
            color: #1a1a2e;
            margin-bottom: 12px;
        }

        p {
            color: #666;
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        a {
            display: inline-block;
            padding: 14px 36px;
            background: #4f46e5;
            color: #fff;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s;
        }

        a:hover {
            background: #3730a3;
        }
    </style>
</head>

<body>
    <div class="card">
        <div class="icon">
            <svg viewBox="0 0 24 24">
                <polyline points="20 6 9 17 4 12" />
            </svg>
        </div>
        <h1>Thank You!</h1>
        <p>Your message has been received.<br>
            Our team will get back to you within 24 hours.</p>
        <a href="index.php">← Back to Home</a>
    </div>
</body>

</html>
