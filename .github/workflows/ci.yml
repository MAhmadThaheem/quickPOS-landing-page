name: QuickPOS CI/CD Pipeline

on:
  push:
    branches:
      - 'feature/**'
      - 'bugfix/**'
      - 'main'
  pull_request:
    branches:
      - main

jobs:

  # ══════════════════════════════════════════
  # STAGE 10 — Jira Commit Message Validation
  # ══════════════════════════════════════════!~
  commit-validation:
    name: "Stage 10 – Jira Commit Validation"
    runs-on: ubuntu-latest
    steps:
      - name: "Stage 1 – Checkout Code"
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Commit Messages for [POS-XXX]
        run: |
          echo "Validating commit messages..."
          # For push events, check only new commits
          if [ "${{ github.event_name }}" == "push" ]; then
            COMMITS=$(git log ${{ github.event.before }}..${{ github.event.after }} --pretty=format:"%s" 2>/dev/null || true)
          else
            COMMITS=$(git log origin/main..HEAD --pretty=format:"%s" 2>/dev/null || true)
          fi

          if [ -z "$COMMITS" ]; then
            echo "No new commits found. Skipping."
            exit 0
          fi

          FAILED=0
          while IFS= read -r msg; do
            if echo "$msg" | grep -qE '^\[POS-[0-9]+\]'; then
              echo "✅ Valid: $msg"
            else
              echo "❌ INVALID (missing [POS-XXX]): $msg"
              FAILED=1
            fi
          done <<< "$COMMITS"

          if [ "$FAILED" -ne 0 ]; then
            echo ""
            echo "All commits must start with [POS-XXX]"
            echo "Example: [POS-101] Add hero section"
            exit 1
          fi

  # ══════════════════════════════════════════════════════
  # STAGE 11 PARALLEL JOB 1 — Code Quality + Syntax Check
  # ══════════════════════════════════════════════════════
  code-quality:
    name: "Stage 3 & 5 – Code Quality + Syntax Check"
    runs-on: ubuntu-latest
    needs: commit-validation

    steps:
      - name: "Stage 1 – Checkout Code"
        uses: actions/checkout@v4

      - name: "Stage 2 – Setup PHP 8.2"
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: phpcs

      - name: "Stage 5 – PHP Syntax Check (php -l)"
        run: |
          echo "Checking PHP syntax..."
          find . -name "*.php" -not -path "./vendor/*" | while read file; do
            php -l "$file" || exit 1
          done
          echo "✅ All PHP files passed syntax check"

      - name: "Stage 3 – Code Quality via PHPCS"
        run: |
          phpcs --standard=PSR12 \
                --ignore=vendor/ \
                --extensions=php \
                --report=full \
                . || echo "⚠️ Style warnings (non-blocking)"

  # ══════════════════════════════════════════════════════
  # STAGE 11 PARALLEL JOB 2 — Automated Tests (PHPUnit)
  # ══════════════════════════════════════════════════════
  automated-tests:
    name: "Stage 4 – PHPUnit Automated Tests"
    runs-on: ubuntu-latest
    needs: commit-validation

    steps:
      - name: "Stage 1 – Checkout Code"
        uses: actions/checkout@v4

      - name: "Stage 2 – Setup PHP 8.2"
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install PHPUnit via Composer
        run: composer install --no-interaction --prefer-dist

      - name: "Stage 4 – Run PHPUnit Tests"
        run: |
          php vendor/bin/phpunit tests/ \
            --testdox \
            --log-junit test-report.xml

      - name: "Stage 6 – Upload Test Report Artifact"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-test-report
          path: test-report.xml
          retention-days: 7

  # ══════════════════════════════════════════════════════
  # FINAL — Stage 8: PR Gate (blocks merge if any fail)
  # ══════════════════════════════════════════════════════
  pipeline-complete:
    name: "Stage 8 – PR Gate Complete"
    runs-on: ubuntu-latest
    needs: [code-quality, automated-tests]

    steps:
      - name: Pipeline Summary
        run: |
          echo "════════════════════════════════════"
          echo "✅ Jira commit validation  – PASSED"
          echo "✅ PHP syntax check        – PASSED"
          echo "✅ Code quality (PHPCS)    – PASSED"
          echo "✅ PHPUnit tests           – PASSED"
          echo "════════════════════════════════════"
          echo "🚀 QuickPOS CI Pipeline SUCCESS"
          echo "PR is cleared for review and merge."
          echo "Vercel will now handle the live deployment."